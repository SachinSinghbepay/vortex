<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cortex — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030303;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 24px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.4); font-size: 14px; line-height: 1.6; max-width: 280px; }
    button {
      margin-top: 24px;
      background: #7c3aed;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="icon">🧠</div>
  <h1>You're offline</h1>
  <p>Cortex needs an internet connection to sync your goals and AI features. Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
